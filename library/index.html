<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library | art & more</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Animated Background -->
  <canvas id="bgCanvas"></canvas>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <span class="site-brand">art & more</span>

      <!-- IG Logo centered -->
      <a href="https://www.instagram.com/_.art_and_more._?igsh=MWM3NmZ4dXc0azN1eQ==" target="_blank" rel="noopener" class="ig-logo-link">
        <img src="../images/ig.png" alt="Instagram" class="ig-logo" />
      </a>

      <nav class="site-nav">
        <a href="../home/index.html" class="nav-link">Home</a>
        <a href="../gallery/index.html" class="nav-link">Gallery</a>
        <a href="./index.html" class="nav-link active">Library</a>
      </nav>
    </div>
  </header>

  <!-- HERO SECTION -->
  <section class="hero">
    <!-- Desktop image -->
    <img src="img/cranes.jpg" alt="Library" class="hero-img hero-desktop" />
    <!-- Mobile image -->
    <img src="img/mobile.jpg" alt="Library Mobile" class="hero-img hero-mobile" />

    <!-- Overlay: title + search centered -->
    <div class="hero-overlay">
      <h1 class="hero-title">Library</h1>
      <div class="hero-search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="text"
          class="hero-search"
          placeholder="Search books…"
          id="searchInput"
        />
      </div>
    </div>
  </section>

  <!-- BOOK GRID -->
  <main class="library-section">
    <div class="book-grid" id="bookGrid"></div>
    <p class="no-results" id="noResults" style="display:none;">No books found.</p>
  </main>

  <script src="../gallery/script.js"></script>
  <script src="script.js"></script>
</body>
</html>
