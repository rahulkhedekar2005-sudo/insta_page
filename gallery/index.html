<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gallery | art & more</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>

    <!-- Animated Background -->
    <canvas id="bgCanvas"></canvas>

    <!-- HEADER (library-style) -->
    <header class="site-header">
        <div class="header-inner">
            <span class="site-brand">art & more</span>

            <!-- IG Logo centered -->
            <a href="https://www.instagram.com/_.art_and_more._?igsh=MWM3NmZ4dXc0azN1eQ==" target="_blank" rel="noopener" class="ig-logo-link">
                <img src="../images/ig.png" alt="Instagram" class="ig-logo" />
            </a>

            <nav class="site-nav">
                <a href="../home/index.html" class="nav-link">Home</a>
                <a href="../gallery/index.html" class="nav-link active">Gallery</a>
                <a href="../library/index.html" class="nav-link">Library</a>
            </nav>
        </div>
    </header>

    <!-- HERO with responsive images + search -->
    <section class="hero">
        <!-- Desktop image -->
        <img src="img/pc.jpg" alt="Gallery" class="hero-img hero-desktop" />
        <!-- Mobile image -->
        <img src="img/mobile.jpg" alt="Gallery Mobile" class="hero-img hero-mobile" />

        <!-- Overlay: title + search centered -->
        <div class="hero-overlay">
            <h1 class="hero-title">Gallery</h1>
            <div class="hero-search-wrap">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input
                    type="text"
                    class="hero-search"
                    placeholder="Search artworks…"
                    id="gallerySearchInput"
                />
            </div>
        </div>
    </section>

    <!-- Gallery Grid -->

    <section class="gallery" id="galleryGrid">

        <!-- Post 1 -->

        <div class="post-card" data-title="artwork 1">

            <div class="image-container">

                <img src="img/1.jpg" alt="Artwork 1">

            </div>

            <div class="post-actions">

                <div class="left-icons">

                    <img src="../images/heart.png" alt="Like">

                    <img src="../images/bubble-chat.png" alt="Comment">

                    <img src="../images/send.png" alt="Share">

                </div>

                <img
                    src="../images/bookmark.png"
                    alt="Save"
                    class="save-icon"
                >

            </div>

        </div>

        <!-- Post 2 -->

        <div class="post-card" data-title="artwork 2">

            <div class="image-container">

                <img
                    src="../images/bookmark.png"
                    class="save-icon"
                >

            </div>

        </div>

        </div>

    </section>

    <!-- No results message -->
    <p class="no-results" id="galleryNoResults" style="display:none;">No artworks found.</p>

    <!-- Coming Soon Modal Popup -->
    <div id="comingSoonModal" class="modal-overlay">
        <div class="modal-card">
            <h2>Coming Soon</h2>
            <p>We are building new creative artwork collections and custom filter tools. Stay tuned!</p>
            <button id="closeModalBtn" class="modal-btn">Explore Now</button>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
